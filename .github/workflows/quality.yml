name: Quality

on:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: No debug console.log in route.ts
        run: |
          if grep -n 'console\.log' app/api/flight/route.ts; then
            echo "❌ Unintentional console.log found in app/api/flight/route.ts"
            exit 1
          else
            echo "✅ No debug console.log found"
          fi
